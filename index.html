<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#CA8A04" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="description" content="Mustafa Akkurt Berberi — Online randevu sistemi" />

    <!-- iOS PWA desteği -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="M. Akkurt" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <title>Mustafa Akkurt Berberi</title>
  </head>
  <body>
    <!-- Runs before React: swap manifest so the browser sees the correct PWA identity
         for /admin/* routes before it evaluates install eligibility. -->
    <script>
      if (window.location.pathname.startsWith('/admin')) {
        var el;
        el = document.querySelector('link[rel="manifest"]');
        if (el) el.href = '/admin-manifest.json';
        el = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (el) el.content = 'MA Panel';
        el = document.querySelector('meta[name="theme-color"]');
        if (el) el.content = '#111827';
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
